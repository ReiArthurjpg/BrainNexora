services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: brainnexora-api
    container_name: brainnexora-web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html
    networks:
      - authnexora-network

networks:
  authnexora-network:
    name: authnexora_authnexora-network
    external: true
