services:
  # PHP API Service para BrainNexora
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: brainnexora-api
    container_name: brainnexora-api
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: api
      SERVICE_TAGS: dev
    volumes:
      - .:/var/www
    networks:
      - authnexora-network

  # Nginx Web Server Service para BrainNexora
  web:
    image: nginx:alpine
    container_name: brainnexora-web
    restart: unless-stopped
    tty: true
    ports:
      - "8083:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - authnexora-network
    depends_on:
      - api

networks:
  authnexora-network:
    name: authnexora_authnexora-network
    external: true
